<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">MoonDepSolve dependency flow</title>
  <desc id="desc">Registry and root requirements flow into the resolver, which emits a lock file, dependency graph, conflict report, and upgrade plan.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#246bfe" />
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#172033" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="920" height="360" rx="18" fill="#ffffff" />
  <g filter="url(#shadow)">
    <rect x="44" y="64" width="180" height="86" rx="10" fill="#f7f8fb" stroke="#d9e0ea" />
    <rect x="44" y="208" width="180" height="86" rx="10" fill="#f7f8fb" stroke="#d9e0ea" />
    <rect x="338" y="122" width="220" height="116" rx="12" fill="#172033" />
    <rect x="690" y="36" width="174" height="62" rx="10" fill="#edf3ff" stroke="#bcd0ff" />
    <rect x="690" y="116" width="174" height="62" rx="10" fill="#ecf8f2" stroke="#bfe7d3" />
    <rect x="690" y="196" width="174" height="62" rx="10" fill="#fff5e8" stroke="#f1d3a8" />
    <rect x="690" y="276" width="174" height="52" rx="10" fill="#fdf0f0" stroke="#efc6c6" />
  </g>
  <text x="70" y="98" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Registry rows</text>
  <text x="70" y="124" fill="#5f6b7a" font-family="Inter, Arial, sans-serif" font-size="14">name version | deps</text>
  <text x="70" y="242" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Root requirements</text>
  <text x="70" y="268" fill="#5f6b7a" font-family="Inter, Arial, sans-serif" font-size="14">app:^1.0.0</text>
  <text x="392" y="166" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">MoonDepSolve</text>
  <text x="384" y="196" fill="#dce6f5" font-family="Inter, Arial, sans-serif" font-size="14">version match + graph + exact search</text>
  <text x="718" y="74" fill="#246bfe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Lock output</text>
  <text x="718" y="154" fill="#138a59" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Dependency graph</text>
  <text x="718" y="234" fill="#b96c0a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Conflict report</text>
  <text x="718" y="308" fill="#b64444" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Upgrade plan</text>
  <g stroke="#246bfe" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 224 107 C 274 107 284 148 336 154" />
    <path d="M 224 251 C 274 251 284 212 336 206" />
    <path d="M 558 166 C 612 150 628 75 688 68" />
    <path d="M 558 176 C 615 176 626 150 688 148" />
    <path d="M 558 190 C 612 202 628 226 688 226" />
    <path d="M 558 206 C 610 238 628 299 688 302" />
  </g>
</svg>
