name: Bug report
description: Report a reproducible MoonDepSolve defect
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include registry, requirements, commands, and output.
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: MoonBit version
      placeholder: moon version
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and private package data.
          required: true
